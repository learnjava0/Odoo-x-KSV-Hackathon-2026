spring:
  application:
    name: VendorBridge Backend
  datasource:
    url: jdbc:postgresql://localhost:5432/vendorbridge
    username: postgres
    password: your_password_here 
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # 256-bit Hex Key for HMAC-SHA256
      expiration: 86400000 # a day
